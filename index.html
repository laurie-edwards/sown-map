<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SoWN Interactive Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
  integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
<link rel="stylesheet" href="style.css">
</head>
<body>

<header class="topbar">
  <h1>SoWN Interactive Map</h1>
  <div class="filter-toggle" role="group" aria-label="Filter projects by programme">
    <button type="button" class="filter-btn is-active" data-filter="all">Show All</button>
    <button type="button" class="filter-btn" data-filter="community-chest">Community Chest</button>
    <button type="button" class="filter-btn" data-filter="ncil">NCIL</button>
  </div>
</header>

<div class="layout">
  <div id="map"></div>

  <aside id="area-wide-panel" aria-label="Area-wide projects">
    <h2>Area-wide Projects</h2>
    <p class="panel-hint">No single site — click a project for details.</p>
    <div id="area-wide-list"></div>
  </aside>
</div>

<div id="modal-overlay" class="modal-overlay" hidden>
  <div class="modal" role="dialog" aria-modal="true">
    <button type="button" class="modal-close" aria-label="Close">&times;</button>
    <div class="modal-content"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
  integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
<script src="data/projects.js"></script>
<script src="app.js"></script>
</body>
</html>
